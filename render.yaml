services:
  - type: web
    name: smartattendance-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn api:app
    envVars:
      - key: DATA_ROOT
        value: /data
    disk:
      name: smartattendance-data
      mountPath: /data
      sizeGB: 1

  - type: web
    name: smartattendance-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
